services:
  db:
    container_name: desten-db
    image: mysql:latest
    restart: always
    environment:
      MYSQL_DATABASE: ${DATABASE}
      MYSQL_USER: ${USERNAME}
      MYSQL_PASSWORD: ${PASSWORD}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    ports:
      - "3306:3306"
    volumes:
          - db_data:/var/lib/mysql

  redis:
    image: redis:latest
    container_name: desten-redis
    volumes:
      - redis-data:/data
    ports:
      - "63791:6379"
volumes:
  db_data:
  redis-data: